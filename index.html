<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Puzzle Shape Highlighter</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7EGHJSJMVN"></script>
  <script>

    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-7EGHJSJMVN');

  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #ffffff;
      --ink: #1c1b18;
      --muted: #6f6a60;
      --line: #2e2b26;
      --rail: #d8d1c3;
      --accent: #e94d55;
      --highlight-opacity: 0.55;
      --match-stroke-width: 2;
      --shadow: 0 18px 60px rgba(38, 34, 27, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 0%, #fefcf7 0, var(--bg) 46%, #ece6da 100%);
      color: var(--ink);
    }

    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(250px, 310px) minmax(0, 1fr);
    }

    aside {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
      border-right: 1px solid rgba(46, 43, 38, 0.16);
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(14px);
    }

    main {
      min-width: 0;
      min-height: 0;
      display: grid;
      padding: 22px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subhead {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .control { display: grid; gap: 8px; }

    label,
    .label {
      color: #4d493f;
      font-size: 12px;
      font-weight: 720;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    select,
    input[type="range"] {
      width: 100%;
      border: 1px solid var(--rail);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
    }

    select {
      min-height: 42px;
      padding: 0 12px;
    }

    input[type="range"] {
      accent-color: #171613;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .range-value {
      min-width: 36px;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid rgba(46, 43, 38, 0.2);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      border-color: #171613;
      background: #171613;
      color: #fff;
    }

    .rule-list {
      display: grid;
      gap: 14px;
    }

    .rule-section {
      display: grid;
      gap: 8px;
    }

    .rule-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .rule-section-title {
      color: #4d493f;
      font-size: 12px;
      font-weight: 720;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .section-actions {
      display: flex;
      gap: 6px;
    }

    .section-action {
      min-height: 24px;
      padding: 0 7px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
    }

    .rule-row {
      display: grid;
      grid-template-columns: auto 22px minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(46, 43, 38, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
    }

    .rule-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .rule-chip {
      width: 22px;
      height: 22px;
      min-height: 0;
      padding: 0;
      border-radius: 6px;
      border: 1px solid rgba(28, 27, 24, 0.28);
    }

    .rule-chip[aria-expanded="true"] {
      outline: 2px solid rgba(28, 27, 24, 0.34);
      outline-offset: 1px;
    }

    .rule-name {
      min-width: 0;
      color: var(--ink);
      font-size: 13px;
      font-weight: 720;
      line-height: 1.25;
    }

    .rule-name span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 620;
    }

    .rule-count {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .rule-only {
      min-height: 24px;
      padding: 0 7px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
    }

    .rule-palette {
      grid-column: 2 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 7px;
      border: 1px solid rgba(46, 43, 38, 0.12);
      border-radius: 8px;
      background: #fff;
    }

    .color-choice {
      width: 20px;
      height: 20px;
      min-height: 0;
      padding: 0;
      border-radius: 6px;
      border: 1px solid rgba(28, 27, 24, 0.26);
    }

    .color-choice[aria-pressed="true"] {
      outline: 2px solid rgba(28, 27, 24, 0.34);
      outline-offset: 1px;
    }

    .stats {
      display: grid;
      gap: 9px;
      padding-top: 8px;
      border-top: 1px solid rgba(46, 43, 38, 0.12);
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--accent);
      border: 1px solid rgba(28, 27, 24, 0.22);
    }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 16px;
      border: 1px solid rgba(46, 43, 38, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
    }

    svg {
      display: block;
      width: min(100%, 1460px);
      height: auto;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: var(--puzzle-ratio);
      margin: 0 auto;
      overflow: hidden;
    }

    .source-image,
    .line-image {
      pointer-events: none;
      user-select: none;
    }

    .line-image {
      mix-blend-mode: multiply;
      opacity: 0.62;
    }

    .piece {
      fill: transparent;
      stroke: rgba(28, 27, 24, 0.08);
      stroke-width: 0.8;
      vector-effect: non-scaling-stroke;
      opacity: 1;
      cursor: pointer;
    }

    .piece:focus {
      outline: none;
    }

    .piece.is-muted { opacity: 0.08; }

    .piece.is-match {
      fill: var(--accent);
      fill-opacity: 1;
      stroke-width: var(--match-stroke-width);
      stroke-opacity: 1;
      opacity: var(--highlight-opacity);
      paint-order: stroke fill;
      vector-effect: non-scaling-stroke;
    }

    @media (max-width: 700px) {
      :root { --match-stroke-width: 1.2; }
    }

    @media (max-width: 430px) {
      :root { --match-stroke-width: 0.75; }
    }

    .piece.is-picked {
      stroke: #171613;
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
    }

    .editor {
      display: grid;
      gap: 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(46, 43, 38, 0.12);
    }

    .editor summary {
      cursor: pointer;
      color: #4d493f;
      font-size: 12px;
      font-weight: 720;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .editor[open] summary {
      margin-bottom: 12px;
    }

    .edge-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .edge-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .edge-buttons button {
      min-height: 30px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 720;
    }

    .edge-buttons button[aria-pressed="true"] {
      border-color: #171613;
      background: #171613;
      color: #fff;
    }

    .edge-buttons button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .save-note {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app { grid-template-columns: 1fr; }

      aside {
        border-right: 0;
        border-bottom: 1px solid rgba(46, 43, 38, 0.16);
      }

      main { padding-top: 0; }

      .stage {
        height: min(70vh, 72vw);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div>
        <h1>Puzzle Shape Highlighter</h1>
      </div>

      <div class="control">
        <label for="opacitySlider">Highlight opacity</label>
        <div class="range-row">
          <input id="opacitySlider" type="range" min="20" max="100" value="55">
          <span class="range-value" id="opacityValue">55%</span>
        </div>
      </div>

      <div class="label">Highlight categories</div>
      <div class="rule-list" id="ruleList"></div>

      <div class="stats">
        <div class="stat"><span>Highlighted</span><strong id="matchCount">0</strong></div>
        <div class="stat"><span>Total pieces</span><strong id="totalCount">500</strong></div>
      </div>

      <details class="editor">
        <summary>Calibration</summary>
        <div class="stat"><span>Picked piece</span><strong id="pickedPiece">None</strong></div>
        <div id="edgeEditor"></div>
        <div class="save-note" id="saveNote">Corrections save in this browser.</div>
        <button id="exportCorrectionsBtn">Export corrections</button>
        <button id="resetCorrectionsBtn">Reset corrections</button>
      </details>
    </aside>

    <main>
      <div class="stage" aria-label="Puzzle outline workspace">
        <svg id="puzzle" role="img" aria-label="Exact photographed jigsaw puzzle cut"></svg>
      </div>
    </main>
  </div>

  <script src="puzzle-cut-data.js?v=user-corrected-round-7"></script>
  <script>
    const DATA = window.PUZZLE_CUT_DATA;
    const colors = [
      '#0057FF',
      '#00B8D9',
      '#FF6B00',
      '#E6002E',
      '#00A651',
      '#88D000',
      '#C100B8',
      '#FF4FA3',
      '#FFD400',
      '#5B5B5B',
      '#7A3DD8',
      '#00D084',
      '#B388FF',
      '#FFB000',
      '#006D77',
      '#FF2D55',
      '#40E0D0',
      '#4B0082',
      '#C6FF00',
      '#FF00FF',
      '#00FFFF',
      '#9B1B30',
      '#003B73',
      '#B0A99F',
      '#000000'
    ];
    const opacitySlider = document.querySelector('#opacitySlider');
    const opacityValue = document.querySelector('#opacityValue');
    const ruleList = document.querySelector('#ruleList');
    const stage = document.querySelector('.stage');
    const puzzle = document.querySelector('#puzzle');
    const matchCount = document.querySelector('#matchCount');
    const totalCount = document.querySelector('#totalCount');
    const pickedPiece = document.querySelector('#pickedPiece');
    const edgeEditor = document.querySelector('#edgeEditor');
    const saveNote = document.querySelector('#saveNote');
    const exportCorrectionsBtn = document.querySelector('#exportCorrectionsBtn');
    const resetCorrectionsBtn = document.querySelector('#resetCorrectionsBtn');
    const storageVersion = `${DATA.edgeClassifier || 'base'}:${DATA.correctionsExportedAt || 'none'}`;
    const storageKey = `puzzle-shape-highlighter:calibration:${storageVersion}`;
    let activeRules = [];
    let activePaletteRuleId = null;
    let highlightOpacity = Number(opacitySlider.value) / 100;
    let selectedPieceId = null;
    let pieces = [];

    const shapeOptions = [
      ['outies-0', '0 outies'],
      ['outies-1', '1 outie'],
      ['edge-inward-1', '1 outie inward'],
      ['edge-near-flat-1', '1 outie near flat'],
      ['adjacent-2', '2 adjacent outies'],
      ['opposite-2', '2 opposite outies'],
      ['outies-3', '3 outies'],
      ['outies-4', '4 outies']
    ];

    const pieceSetOptions = [
      ['interior', 'Interior pieces'],
      ['edges', 'Edges']
    ];

    const defaultRuleColors = [
      '#0057FF',
      '#FF6B00',
      '#00A651',
      '#C100B8',
      '#FFD400',
      '#7A3DD8',
      '#00B8D9',
      '#E6002E',
      '#FF4FA3',
      '#88D000',
      '#006D77',
      '#5B5B5B'
    ];

    function svgEl(name, attrs = {}) {
      const node = document.createElementNS('http://www.w3.org/2000/svg', name);
      for (const [key, value] of Object.entries(attrs)) node.setAttribute(key, value);
      return node;
    }

    function setHighlightOpacity(value) {
      highlightOpacity = Number(value) / 100;
      document.documentElement.style.setProperty('--highlight-opacity', String(highlightOpacity));
      opacityValue.textContent = `${value}%`;
    }

    function fitPuzzleToStage() {
      const stageStyle = getComputedStyle(stage);
      const availableWidth = stage.clientWidth - parseFloat(stageStyle.paddingLeft) - parseFloat(stageStyle.paddingRight);
      const availableHeight = stage.clientHeight - parseFloat(stageStyle.paddingTop) - parseFloat(stageStyle.paddingBottom);
      const ratio = DATA.width / DATA.height;
      const width = Math.min(availableWidth, availableHeight * ratio, 1460);
      const height = width / ratio;
      puzzle.style.width = `${Math.max(0, width)}px`;
      puzzle.style.height = `${Math.max(0, height)}px`;
      puzzle.style.setProperty('--puzzle-ratio', `${DATA.width} / ${DATA.height}`);
    }

    function point(x, y, ux, uy, nx, ny, t, normal) {
      return [x + ux * t + nx * normal, y + uy * t + ny * normal];
    }

    function curve(path, a, b, end) {
      path.push(`C ${a[0].toFixed(2)} ${a[1].toFixed(2)} ${b[0].toFixed(2)} ${b[1].toFixed(2)} ${end[0].toFixed(2)} ${end[1].toFixed(2)}`);
    }

    function edgePath(path, x, y, ux, uy, nx, ny, length, edgeType) {
      if (edgeType === 0) {
        path.push(`L ${(x + ux * length).toFixed(2)} ${(y + uy * length).toFixed(2)}`);
        return;
      }

      const sign = edgeType;
      const tab = Math.min(18, Math.max(13, length * 0.22));
      const p1 = point(x, y, ux, uy, nx, ny, length * 0.30, 0);
      const p3 = point(x, y, ux, uy, nx, ny, length * 0.39, sign * tab * 0.62);
      const p5 = point(x, y, ux, uy, nx, ny, length * 0.61, sign * tab * 0.62);
      const p7 = point(x, y, ux, uy, nx, ny, length * 0.70, 0);
      const end = point(x, y, ux, uy, nx, ny, length, 0);

      path.push(`L ${p1[0].toFixed(2)} ${p1[1].toFixed(2)}`);
      curve(path, point(x, y, ux, uy, nx, ny, length * 0.34, 0), point(x, y, ux, uy, nx, ny, length * 0.36, sign * tab * 0.60), p3);
      curve(path, point(x, y, ux, uy, nx, ny, length * 0.42, sign * tab * 1.25), point(x, y, ux, uy, nx, ny, length * 0.58, sign * tab * 1.25), p5);
      curve(path, point(x, y, ux, uy, nx, ny, length * 0.64, sign * tab * 0.60), point(x, y, ux, uy, nx, ny, length * 0.66, 0), p7);
      path.push(`L ${end[0].toFixed(2)} ${end[1].toFixed(2)}`);
    }

    function piecePath(piece) {
      const x1 = DATA.xlines[piece.col];
      const x2 = DATA.xlines[piece.col + 1];
      const y1 = DATA.ylines[piece.row];
      const y2 = DATA.ylines[piece.row + 1];
      const w = x2 - x1;
      const h = y2 - y1;
      const path = [`M ${x1.toFixed(2)} ${y1.toFixed(2)}`];
      edgePath(path, x1, y1, 1, 0, 0, -1, w, piece.edges.top);
      edgePath(path, x2, y1, 0, 1, 1, 0, h, piece.edges.right);
      edgePath(path, x2, y2, -1, 0, 0, 1, w, piece.edges.bottom);
      edgePath(path, x1, y2, 0, -1, -1, 0, h, piece.edges.left);
      path.push('Z');
      return path.join(' ');
    }

    function oneOutieEdgePosition(edges, outies, flats) {
      if (outies !== 1 || flats === 0) return null;
      const sides = ['top', 'right', 'bottom', 'left'];
      const outieSide = sides.find(side => edges[side] === 1);
      const flatSides = sides.filter(side => edges[side] === 0);
      if (!outieSide || flatSides.length !== 1) return 'near-flat';
      return oppositeSide(flatSides[0]) === outieSide ? 'inward' : 'near-flat';
    }

    function buildPieces() {
      const built = [];
      const pathById = new Map((DATA.pieces || []).map(piece => [piece.id, piece]));
      for (let row = 0; row < DATA.rows; row++) {
        for (let col = 0; col < DATA.cols; col++) {
          const id = `r${row + 1}c${col + 1}`;
          const pathPiece = pathById.get(id);
          const [top, right, bottom, left] = DATA.edges[row][col];
          const edges = { top, right, bottom, left };
          const outies = Object.values(edges).filter(edge => edge === 1).length;
          const flats = Object.values(edges).filter(edge => edge === 0).length;
          const oneOutiePosition = oneOutieEdgePosition(edges, outies, flats);
          built.push({
            id,
            row,
            col,
            d: pathPiece ? pathPiece.d : null,
            edges,
            outies,
            flats,
            oneOutiePosition,
            adjacent2: outies === 2 && (
              (top === 1 && right === 1) ||
              (right === 1 && bottom === 1) ||
              (bottom === 1 && left === 1) ||
              (left === 1 && top === 1)
            ),
            opposite2: outies === 2 && (
              (top === 1 && bottom === 1) ||
              (left === 1 && right === 1)
            )
          });
        }
      }
      return built;
    }

    function refreshPieces() {
      pieces = buildPieces();
    }

    function loadSavedEdges() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if (!saved || saved.rows !== DATA.rows || saved.cols !== DATA.cols) return;
        DATA.edges = saved.edges;
        saveNote.textContent = 'Loaded saved corrections';
      } catch {
        localStorage.removeItem(storageKey);
      }
    }

    function saveEdges() {
      localStorage.setItem(storageKey, JSON.stringify({
        rows: DATA.rows,
        cols: DATA.cols,
        savedAt: new Date().toISOString(),
        edges: DATA.edges
      }));
      saveNote.textContent = 'Saved';
    }

    function exportCorrections() {
      const payload = {
        rows: DATA.rows,
        cols: DATA.cols,
        exportedAt: new Date().toISOString(),
        edges: DATA.edges
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'puzzle-corrections.json';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      saveNote.textContent = 'Exported corrections';
    }

    function matches(piece, type) {
      if (type === 'all') return true;
      if (type.startsWith('outies-')) return piece.outies === Number(type.split('-')[1]);
      if (type === 'edge-inward-1') return piece.outies === 1 && piece.oneOutiePosition === 'inward';
      if (type === 'edge-near-flat-1') return piece.outies === 1 && piece.oneOutiePosition === 'near-flat';
      if (type === 'adjacent-2') return piece.adjacent2;
      if (type === 'opposite-2') return piece.opposite2;
      return false;
    }

    function matchesPieceSet(piece, set) {
      if (set === 'all') return true;
      if (set === 'interior') return piece.flats === 0;
      if (set === 'edges') return piece.flats > 0;
      return false;
    }

    function optionLabel(options, value) {
      const item = options.find(([itemValue]) => itemValue === value);
      return item ? item[1] : value;
    }

    function renderRules(ruleCounts = new Map()) {
      ruleList.innerHTML = '';
      for (const [setValue, setLabel] of pieceSetOptions) {
        const section = document.createElement('div');
        section.className = 'rule-section';

        const header = document.createElement('div');
        header.className = 'rule-section-header';

        const title = document.createElement('div');
        title.className = 'rule-section-title';
        title.textContent = setLabel;
        header.appendChild(title);

        const actions = document.createElement('div');
        actions.className = 'section-actions';

        const selectAll = document.createElement('button');
        selectAll.className = 'section-action';
        selectAll.type = 'button';
        selectAll.textContent = 'Select all';
        selectAll.addEventListener('click', () => {
          activeRules
            .filter(rule => rule.set === setValue)
            .forEach(rule => { rule.enabled = true; });
          update();
        });
        actions.appendChild(selectAll);

        const clearAll = document.createElement('button');
        clearAll.className = 'section-action';
        clearAll.type = 'button';
        clearAll.textContent = 'Clear all';
        clearAll.addEventListener('click', () => {
          activeRules
            .filter(rule => rule.set === setValue)
            .forEach(rule => { rule.enabled = false; });
          update();
        });
        actions.appendChild(clearAll);

        header.appendChild(actions);
        section.appendChild(header);

        for (const rule of activeRules.filter(item => item.set === setValue)) {
          const row = document.createElement('div');
          row.className = 'rule-row';

          const toggle = document.createElement('input');
          toggle.type = 'checkbox';
          toggle.autocomplete = 'off';
          toggle.defaultChecked = false;
          toggle.checked = rule.enabled;
          toggle.setAttribute('aria-label', `Toggle ${optionLabel(shapeOptions, rule.shape)} ${optionLabel(pieceSetOptions, rule.set)}`);
          toggle.addEventListener('change', () => {
            rule.enabled = toggle.checked;
            update();
          });
          row.appendChild(toggle);

          const chip = document.createElement('button');
          chip.className = 'rule-chip';
          chip.type = 'button';
          chip.style.backgroundColor = rule.color;
          chip.setAttribute('aria-label', `Change color for ${optionLabel(shapeOptions, rule.shape)} ${optionLabel(pieceSetOptions, rule.set)}`);
          chip.setAttribute('aria-expanded', String(activePaletteRuleId === rule.id));
          chip.addEventListener('click', () => {
            activePaletteRuleId = activePaletteRuleId === rule.id ? null : rule.id;
            update();
          });
          row.appendChild(chip);

          const name = document.createElement('div');
          name.className = 'rule-name';
          name.textContent = optionLabel(shapeOptions, rule.shape);
          row.appendChild(name);

          const count = document.createElement('span');
          count.className = 'rule-count';
          count.textContent = ruleCounts.get(rule.id) || 0;
          row.appendChild(count);

          const onlyButton = document.createElement('button');
          onlyButton.className = 'rule-only';
          onlyButton.type = 'button';
          onlyButton.textContent = 'Only';
          onlyButton.setAttribute('aria-label', `Select only ${optionLabel(shapeOptions, rule.shape)} ${optionLabel(pieceSetOptions, rule.set)}`);
          onlyButton.addEventListener('click', () => {
            activeRules.forEach(item => { item.enabled = item.id === rule.id; });
            activePaletteRuleId = null;
            update();
          });
          row.appendChild(onlyButton);

          if (activePaletteRuleId === rule.id) {
            const palette = document.createElement('div');
            palette.className = 'rule-palette';
            for (const color of colors) {
              const button = document.createElement('button');
              button.className = 'color-choice';
              button.type = 'button';
              button.style.backgroundColor = color;
              button.setAttribute('aria-label', `${color} for ${optionLabel(shapeOptions, rule.shape)} ${optionLabel(pieceSetOptions, rule.set)}`);
              button.setAttribute('aria-pressed', String(rule.color === color));
              button.addEventListener('click', () => {
                rule.color = color;
                activePaletteRuleId = null;
                update();
              });
              palette.appendChild(button);
            }
            row.appendChild(palette);
          }

          section.appendChild(row);
        }

        ruleList.appendChild(section);
      }
    }

    function edgeLabel(edge) {
      return edge === 1 ? 'out' : edge === -1 ? 'in' : 'flat';
    }

    function update() {
      let highlightedCount = 0;
      const ruleCounts = new Map(activeRules.map(rule => [rule.id, 0]));
      const enabledRules = activeRules.filter(rule => rule.enabled);

      for (const piece of pieces) {
        const node = document.querySelector(`[data-piece-id="${piece.id}"]`);
        const matchedRule = enabledRules.find(rule => matches(piece, rule.shape) && matchesPieceSet(piece, rule.set));
        const isMatch = Boolean(matchedRule);
        if (matchedRule) {
          highlightedCount += 1;
          ruleCounts.set(matchedRule.id, (ruleCounts.get(matchedRule.id) || 0) + 1);
          node.style.fill = matchedRule.color;
          node.style.stroke = matchedRule.color;
        } else {
          node.style.fill = '';
          node.style.stroke = '';
        }
        node.classList.toggle('is-match', isMatch);
        node.classList.toggle('is-muted', enabledRules.length > 0 && !isMatch);
        node.classList.toggle('is-picked', selectedPieceId === piece.id);
      }

      matchCount.textContent = highlightedCount;
      renderRules(ruleCounts);
      updateEdgeEditor();
    }

    function render() {
      puzzle.setAttribute('viewBox', `0 0 ${DATA.width} ${DATA.height}`);
      puzzle.style.setProperty('--puzzle-ratio', `${DATA.width} / ${DATA.height}`);
      puzzle.innerHTML = '';
      refreshPieces();
      totalCount.textContent = pieces.length;

      puzzle.appendChild(svgEl('image', {
        class: 'source-image',
        href: DATA.source,
        x: 0,
        y: 0,
        width: DATA.width,
        height: DATA.height
      }));

      const group = svgEl('g', { id: 'pieceLayer' });
      for (const piece of pieces) {
        const path = piece.d ? svgEl('path', {
          class: 'piece',
          d: piece.d,
          tabindex: 0,
          'aria-label': `${piece.id}, ${piece.outies} outies`
        }) : svgEl('rect', {
          class: 'piece',
          x: DATA.xlines[piece.col],
          y: DATA.ylines[piece.row],
          width: DATA.xlines[piece.col + 1] - DATA.xlines[piece.col],
          height: DATA.ylines[piece.row + 1] - DATA.ylines[piece.row],
          tabindex: 0,
          'aria-label': `${piece.id}, ${piece.outies} outies`
        });
        path.dataset.pieceId = piece.id;
        path.addEventListener('click', () => pick(piece));
        path.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            pick(piece);
          }
        });
        group.appendChild(path);
      }
      puzzle.appendChild(group);

      puzzle.appendChild(svgEl('image', {
        class: 'line-image',
        href: DATA.source,
        x: 0,
        y: 0,
        width: DATA.width,
        height: DATA.height
      }));

      update();
      fitPuzzleToStage();
    }

    function pick(piece) {
      selectedPieceId = piece.id;
      pickedPiece.textContent = `${piece.id}: ${piece.outies} out, ${piece.flats} flat`;
      pickedPiece.title = `Top ${edgeLabel(piece.edges.top)}, right ${edgeLabel(piece.edges.right)}, bottom ${edgeLabel(piece.edges.bottom)}, left ${edgeLabel(piece.edges.left)}`;
      update();
    }

    function pieceById(id) {
      return pieces.find(piece => piece.id === id);
    }

    function oppositeSide(side) {
      return { top: 'bottom', right: 'left', bottom: 'top', left: 'right' }[side];
    }

    function neighborOf(piece, side) {
      const offsets = {
        top: [-1, 0],
        right: [0, 1],
        bottom: [1, 0],
        left: [0, -1]
      };
      const [dr, dc] = offsets[side];
      const row = piece.row + dr;
      const col = piece.col + dc;
      if (row < 0 || row >= DATA.rows || col < 0 || col >= DATA.cols) return null;
      return { row, col };
    }

    function edgeIndex(side) {
      return { top: 0, right: 1, bottom: 2, left: 3 }[side];
    }

    function setPieceEdge(piece, side, value) {
      const neighbor = neighborOf(piece, side);
      DATA.edges[piece.row][piece.col][edgeIndex(side)] = neighbor ? value : 0;
      saveEdges();
      refreshPieces();
      const refreshed = pieceById(piece.id);
      selectedPieceId = refreshed.id;
      pickedPiece.textContent = `${refreshed.id}: ${refreshed.outies} out, ${refreshed.flats} flat`;
      pickedPiece.title = `Top ${edgeLabel(refreshed.edges.top)}, right ${edgeLabel(refreshed.edges.right)}, bottom ${edgeLabel(refreshed.edges.bottom)}, left ${edgeLabel(refreshed.edges.left)}`;
      update();
    }

    function updateEdgeEditor() {
      const piece = selectedPieceId ? pieceById(selectedPieceId) : null;
      if (!piece) {
        edgeEditor.innerHTML = '<div class="subhead">Click a piece to inspect or correct top/right/bottom/left.</div>';
        return;
      }

      edgeEditor.innerHTML = '';
      for (const side of ['top', 'right', 'bottom', 'left']) {
        const row = document.createElement('div');
        row.className = 'edge-row';
        const label = document.createElement('span');
        label.textContent = side;
        row.appendChild(label);

        const buttons = document.createElement('div');
        buttons.className = 'edge-buttons';
        for (const [value, labelText] of [[1, 'out'], [-1, 'in'], [0, 'flat']]) {
          const button = document.createElement('button');
          button.type = 'button';
          button.textContent = labelText;
          button.dataset.side = side;
          button.dataset.value = String(value);
          button.setAttribute('aria-pressed', String(piece.edges[side] === value));
          const isBoundary = !neighborOf(piece, side);
          button.disabled = isBoundary && value !== 0;
          button.addEventListener('click', () => setPieceEdge(piece, side, value));
          buttons.appendChild(button);
        }
        row.appendChild(buttons);
        edgeEditor.appendChild(row);
      }
    }

    function populateControls() {
      let colorIndex = 0;
      activeRules = [];
      const rulesBySet = {
        interior: ['outies-0', 'outies-1', 'adjacent-2', 'opposite-2', 'outies-3', 'outies-4'],
        edges: ['outies-0', 'edge-inward-1', 'edge-near-flat-1', 'adjacent-2', 'opposite-2', 'outies-3']
      };
      for (const [set] of pieceSetOptions) {
        for (const shape of rulesBySet[set]) {
          activeRules.push({
            id: `${shape}-${set}`,
            shape,
            set,
            color: defaultRuleColors[colorIndex % defaultRuleColors.length],
            enabled: false
          });
          colorIndex += 1;
        }
      }
    }

    exportCorrectionsBtn.addEventListener('click', exportCorrections);

    opacitySlider.addEventListener('input', event => {
      setHighlightOpacity(event.target.value);
    });

    resetCorrectionsBtn.addEventListener('click', () => {
      localStorage.removeItem(storageKey);
      location.reload();
    });

    loadSavedEdges();
    populateControls();
    setHighlightOpacity(opacitySlider.value);
    render();

    if ('ResizeObserver' in window) {
      new ResizeObserver(fitPuzzleToStage).observe(stage);
    } else {
      window.addEventListener('resize', fitPuzzleToStage);
    }
  </script>
</body>
</html>
